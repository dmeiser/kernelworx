[pytest]
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# IMPORTANT: Some test modules use _module_state to share data between tests.
# Do NOT use pytest-randomly or --randomly-seed with this suite.
# Tests must run in file order within each module.
# -p no:randomly disables pytest-randomly if installed (harmless if absent).
addopts = -v --strict-markers -p no:randomly --screenshot=only-on-failure --video=retain-on-failure --tracing=retain-on-failure
markers =
    smoke: marks tests as smoke tests (select with '-m smoke')
    slow: marks tests as potentially slow
