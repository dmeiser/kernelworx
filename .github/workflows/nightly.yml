name: Nightly Rebuild and Test

on:
  schedule:
    - cron: '0 4 * * *' # 4 AM UTC (12 AM EDT)
  workflow_dispatch: # Allow manual trigger

jobs:
  quality:
    name: Quality Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    name: Build and Push Docker Images
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version
        id: version
        run: |
          # Get version from package.json or pyproject.toml
          VERSION=$(grep '"version":' package.json | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract major and major.minor
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPO }}:latest
            ${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.major }}
            ${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.major_minor }}
            ${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
